services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: gather
      POSTGRES_PASSWORD: gather
      POSTGRES_DB: gather
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gather"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
